services:
  mission-control:
    build: .
    container_name: mission-control
    restart: unless-stopped
    ports:
      - "${MC_PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - OPENCLAW_DIR=/openclaw
    volumes:
      # Persist SQLite databases and JSON state across restarts
      - mc-data:/app/data
      # Mount OpenClaw directory (read-only) so the app can read agents, sessions, etc.
      # Hostinger default: /docker/openclaw-rsuu/data/.openclaw
      - ${OPENCLAW_HOST_PATH:-/docker/openclaw-rsuu/data/.openclaw}:/openclaw:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mc-data:
    driver: local
